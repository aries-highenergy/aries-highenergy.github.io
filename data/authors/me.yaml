bio: |
  Dr. Kuntal Misra is a Scientist-E at the Aryabhatta Research Institute of Observational Sciences (ARIES), Nainital, India.
  Her research focuses on high-energy cosmic transients, including Gamma-Ray Bursts, Supernovae, and the electromagnetic counterparts of gravitational wave sources.

