<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Only run this logic on pages that contain .team-grid
    if (!document.querySelector('.team-grid')) return;

    // 1. Create modal markup dynamically
    var modalOverlay = document.createElement('div');
    modalOverlay.id = 'scholar-modal';
    modalOverlay.className = 'scholar-modal-overlay';
    modalOverlay.innerHTML = `
      <div class="scholar-modal-container">
        <button class="scholar-modal-close-btn" aria-label="Close modal">&times;</button>
        <div class="scholar-modal-content">
          <div class="scholar-modal-sidebar">
            <img src="" alt="" class="scholar-modal-photo">
            <div class="scholar-role"></div>
            <div class="scholar-modal-joined-text" style="font-size: 0.8rem; margin: 0.25rem 0; opacity: 0.85;"></div>
            <a href="" class="scholar-email-link"></a>
            <div class="scholar-modal-socials"></div>
          </div>
          <div class="scholar-modal-main">
            <h3 class="scholar-modal-name"></h3>
            
            <div class="scholar-modal-focus-section">
              <h5 class="scholar-modal-section-title">Research Focus</h5>
              <p class="scholar-modal-text scholar-modal-focus-text"></p>
            </div>
            
            <div class="scholar-modal-interests-section">
              <h5 class="scholar-modal-section-title">Research Interests</h5>
              <div class="scholar-modal-tags"></div>
            </div>
            
            <div class="scholar-modal-bio-section">
              <h5 class="scholar-modal-section-title">Biography</h5>
              <p class="scholar-modal-text scholar-modal-bio-text"></p>
            </div>

            <div class="scholar-modal-pubs-first-section">
              <h5 class="scholar-modal-section-title">First-Author Publications</h5>
              <div class="scholar-modal-text scholar-modal-pubs-first-content"></div>
            </div>

            <div class="scholar-modal-pubs-contrib-section">
              <h5 class="scholar-modal-section-title">Co-authored / Contributor Publications</h5>
              <div class="scholar-modal-text scholar-modal-pubs-contrib-content"></div>
            </div>
          </div>
        </div>
      </div>
    `;
    document.body.appendChild(modalOverlay);

    // Get references to modal sub-elements
    var container = modalOverlay.querySelector('.scholar-modal-container');
    var closeBtn = modalOverlay.querySelector('.scholar-modal-close-btn');
    var photo = modalOverlay.querySelector('.scholar-modal-photo');
    var role = modalOverlay.querySelector('.scholar-role');
    var joined = modalOverlay.querySelector('.scholar-modal-joined-text');
    var emailLink = modalOverlay.querySelector('.scholar-email-link');
    var socials = modalOverlay.querySelector('.scholar-modal-socials');
    var name = modalOverlay.querySelector('.scholar-modal-name');
    var focusSection = modalOverlay.querySelector('.scholar-modal-focus-section');
    var focusText = modalOverlay.querySelector('.scholar-modal-focus-text');
    var interestsSection = modalOverlay.querySelector('.scholar-modal-interests-section');
    var tagsContainer = modalOverlay.querySelector('.scholar-modal-tags');
    var bioSection = modalOverlay.querySelector('.scholar-modal-bio-section');
    var bioText = modalOverlay.querySelector('.scholar-modal-bio-text');
    var pubsFirstSection = modalOverlay.querySelector('.scholar-modal-pubs-first-section');
    var pubsFirstContent = modalOverlay.querySelector('.scholar-modal-pubs-first-content');
    var pubsContribSection = modalOverlay.querySelector('.scholar-modal-pubs-contrib-section');
    var pubsContribContent = modalOverlay.querySelector('.scholar-modal-pubs-contrib-content');

    // 2. Open modal function
    window.openScholarModal = function(card) {
      // Load name & role
      var cardName = card.querySelector('.scholar-name').textContent;
      name.textContent = cardName;
      role.textContent = card.querySelector('.scholar-role').textContent;
      
      // Load photo (use high-resolution if available, else standard)
      var cardImg = card.querySelector('.scholar-img');
      var imgSrc = cardImg ? cardImg.getAttribute('src') : '/media/avatar_placeholder.png';
      // If there is an optimized local image, see if we have original high res
      if (imgSrc.includes('Monalisa.jpg')) {
        imgSrc = '/media/Monalisa_original.jpg';
      } else if (imgSrc.includes('pankaj.jpg')) {
        imgSrc = '/media/pankaj.jpg';
      } else if (imgSrc.includes('Naveen.jpg')) {
        imgSrc = '/media/Naveen_original.jpg';
      }
      photo.src = imgSrc;
      photo.alt = cardName;

      // Load email
      var mailLink = card.querySelector('.scholar-link[href^="mailto:"]');
      if (mailLink) {
        var email = mailLink.textContent;
        emailLink.href = 'mailto:' + email;
        emailLink.textContent = email;
        emailLink.style.display = 'block';
      } else {
        emailLink.style.display = 'none';
      }

      // Clone social links
      socials.innerHTML = '';
      var cardSocials = card.querySelector('.scholar-social-links');
      if (cardSocials) {
        socials.innerHTML = cardSocials.innerHTML;
      }

      // Load hidden detailed fields
      var hiddenDetails = card.querySelector('.scholar-details-hidden');
      if (hiddenDetails) {
        // Joined Date
        var valJoined = hiddenDetails.querySelector('.modal-joined');
        if (valJoined && valJoined.textContent.trim()) {
          joined.textContent = 'Joined the group in ' + valJoined.textContent.trim();
          joined.style.display = 'block';
        } else {
          joined.style.display = 'none';
        }

        // Research Focus
        var valFocus = hiddenDetails.querySelector('.modal-focus');
        if (valFocus && valFocus.textContent.trim()) {
          focusText.textContent = valFocus.textContent.trim();
          focusSection.style.display = 'block';
        } else {
          focusSection.style.display = 'none';
        }

        // Research Interests (tags)
        var valInterests = hiddenDetails.querySelector('.modal-interests');
        tagsContainer.innerHTML = '';
        if (valInterests && valInterests.textContent.trim()) {
          var tags = valInterests.textContent.split(',');
          tags.forEach(function(tag) {
            var trimmed = tag.trim();
            if (trimmed) {
              var pill = document.createElement('span');
              pill.className = 'scholar-modal-tag-pill';
              pill.textContent = trimmed;
              tagsContainer.appendChild(pill);
            }
          });
          interestsSection.style.display = 'block';
        } else {
          interestsSection.style.display = 'none';
        }

        // Full Biography
        var valBio = hiddenDetails.querySelector('.modal-bio');
        if (valBio && valBio.innerHTML.trim()) {
          // Replace newlines with <br> for simple HTML display
          bioText.innerHTML = valBio.innerHTML.trim().replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
          bioSection.style.display = 'block';
        } else {
          bioSection.style.display = 'none';
        }

        // First-Author Publications
        var valPubsFirst = hiddenDetails.querySelector('.modal-pubs-first');
        if (valPubsFirst && valPubsFirst.innerHTML.trim() && valPubsFirst.innerHTML.trim() !== '<p>None yet</p>' && !valPubsFirst.textContent.includes('None yet')) {
          pubsFirstContent.innerHTML = valPubsFirst.innerHTML.trim();
          pubsFirstSection.style.display = 'block';
        } else {
          pubsFirstSection.style.display = 'none';
        }

        // Contributor Publications
        var valPubsContrib = hiddenDetails.querySelector('.modal-pubs-contrib');
        if (valPubsContrib && valPubsContrib.innerHTML.trim() && valPubsContrib.innerHTML.trim() !== '<p>None yet</p>' && !valPubsContrib.textContent.includes('None yet')) {
          pubsContribContent.innerHTML = valPubsContrib.innerHTML.trim();
          pubsContribSection.style.display = 'block';
        } else {
          pubsContribSection.style.display = 'none';
        }
      } else {
        // Fallbacks for cards without hidden details yet
        joined.style.display = 'none';
        focusSection.style.display = 'none';
        interestsSection.style.display = 'none';
        bioSection.style.display = 'none';
      }

      // Show Modal
      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden'; // Disable page scrolling
    };

    // Close Modal helper
    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = ''; // Re-enable page scrolling
    }

    // 3. Bind close triggers
    closeBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', function(e) {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modalOverlay.classList.contains('open')) {
        closeModal();
      }
    });
  });
</script>
